services:
  postgres:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - novel_translation

  backend:
    build:
      context: ./backend
      dockerfile: ../infra/backend.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novel_translation

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/frontend.Dockerfile
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - novel_translation

volumes:
  postgres_data:
  frontend_node_modules:

networks:
  novel_translation:
    driver: bridge
